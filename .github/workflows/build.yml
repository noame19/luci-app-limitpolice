name: Build IPK

# Triggers:
#   - manual run (workflow_dispatch)
#   - any tag matching v*
#   - pushes to main that touch the package itself (optional)
on:
  workflow_dispatch:
  push:
    tags: [ 'v*' ]
    paths:
      - 'Makefile'
      - 'files/**'
      - '.github/workflows/build.yml'

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      # Each entry is one (OpenWrt release, target arch) pair.
      matrix:
        include:
          - name: openwrt-21.02.7 (x86_64)
            sdk: https://downloads.openwrt.org/releases/21.02.7/targets/x86/64/openwrt-sdk-21.02.7-x86-64_gcc-8.4.0_musl.Linux-x86_64.tar.xz
            packages_dir: x86_64
          - name: openwrt-22.03.6 (x86_64)
            sdk: https://downloads.openwrt.org/releases/22.03.6/targets/x86/64/openwrt-sdk-22.03.6-x86-64_gcc-11.2.0_musl.Linux-x86_64.tar.xz
            packages_dir: x86_64
          - name: openwrt-23.05.4 (x86_64)
            sdk: https://downloads.openwrt.org/releases/23.05.4/targets/x86/64/openwrt-sdk-23.05.4-x86-64_gcc-12.3.0_musl.Linux-x86_64.tar.xz
            packages_dir: x86_64
          - name: openwrt-24.10.0 (x86_64)
            sdk: https://downloads.openwrt.org/releases/24.10.0/targets/x86/64/openwrt-sdk-24.10.0-x86-64_gcc-13.3.0_musl.Linux-x86_64.tar.xz
            packages_dir: x86_64
          - name: openwrt-21.02.7 (ramips/mt7621)
            sdk: https://downloads.openwrt.org/releases/21.02.7/targets/ramips/mt7621/openwrt-sdk-21.02.7-ramips-mt7621_gcc-8.4.0_musl.Linux-x86_64.tar.xz
            packages_dir: ramips_24kc
          - name: openwrt-23.05.4 (ramips/mt7621)
            sdk: https://downloads.openwrt.org/releases/23.05.4/targets/ramips/mt7621/openwrt-sdk-23.05.4-ramips-mt7621_gcc-12.3.0_musl.Linux-x86_64.tar.xz
            packages_dir: ramips_24kc
          - name: openwrt-24.10.0 (mediatek/filogic)
            sdk: https://downloads.openwrt.org/releases/24.10.0/targets/mediatek/filogic/openwrt-sdk-24.10.0-mediatek-filogic_gcc-13.3.0_musl.Linux-x86_64.tar.xz
            packages_dir: aarch64_cortex-a53

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache OpenWrt SDK
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: sdk
          key: sdk-${{ matrix.name }}-${{ hashFiles('Makefile', 'files/**') }}

      - name: Download OpenWrt SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          echo "Downloading ${{ matrix.sdk }}"
          curl -fsSL "${{ matrix.sdk }}" -o sdk.tar.xz
          tar -xJf sdk.tar.xz
          rm sdk.tar.xz
          # Normalize dir name to 'sdk/' for the cache key to match.
          if [ -d openwrt-sdk-* ]; then
            mv openwrt-sdk-* sdk
          fi

      - name: Stage package into SDK
        run: |
          set -euo pipefail
          rm -rf sdk/package/luci-app-limitpolice
          mkdir -p sdk/package/luci-app-limitpolice
          # Preserve the OpenWrt package layout: Makefile + files/ at top level.
          cp Makefile sdk/package/luci-app-limitpolice/Makefile
          cp LICENSE sdk/package/luci-app-limitpolice/LICENSE
          cp -r files sdk/package/luci-app-limitpolice/files

      - name: Build package
        working-directory: sdk
        run: |
          set -euo pipefail
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          echo "CONFIG_PACKAGE_luci-app-limitpolice=m" >> .config
          make defconfig
          make package/luci-app-limitpolice/compile V=s

          echo "==== built artifacts ===="
          find bin/packages -name 'luci-app-limitpolice*.ipk' -print -exec ls -lh {} +

      - name: Upload .ipk artifact
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-limitpolice-${{ matrix.name }}
          path: sdk/bin/packages/${{ matrix.packages_dir }}/luci-app-limitpolice*.ipk
          if-no-files-found: error