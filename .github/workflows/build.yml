name: Build IPK

on:
  workflow_dispatch:
  push:
    tags: [ 'v*' ]
    paths:
      - 'Makefile'
      - 'files/**'
      - '.github/workflows/build.yml'

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        # Each entry is one target hardware family. The package contents
        # are text/shell only, so a single .ipk per arch covers every
        # OpenWrt release we support (18.06 → 24.10). Opkg resolves
        # per-arch kmod dependencies at install time.
        #
        # Build SDK is OpenWrt 24.10.7 (latest 24.10 point release).
        # SDK archives use .tar.zst (zstd) since OpenWrt 24.10.
        #
        # Artifact names MUST NOT contain / \ : * ? " < > | because of
        # NTFS download compatibility. We use short, filesystem-safe
        # labels (mt7621 / filogic) for the artifact, and the full
        # OpenWrt arch name (mipsel_24kc / aarch64_cortex-a53) only as
        # the IPK output directory inside the SDK.
        include:
          - name: mt7621
            sdk: https://downloads.openwrt.org/releases/24.10.7/targets/ramips/mt7621/openwrt-sdk-24.10.7-ramips-mt7621_gcc-13.3.0_musl.Linux-x86_64.tar.zst
            packages_dir: mipsel_24kc

          - name: ath79
            sdk: https://downloads.openwrt.org/releases/24.10.7/targets/ath79/generic/openwrt-sdk-24.10.7-ath79-generic_gcc-13.3.0_musl.Linux-x86_64.tar.zst
            packages_dir: mips_24kc

          - name: filogic
            sdk: https://downloads.openwrt.org/releases/24.10.7/targets/mediatek/filogic/openwrt-sdk-24.10.7-mediatek-filogic_gcc-13.3.0_musl.Linux-x86_64.tar.zst
            packages_dir: aarch64_cortex-a53

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache OpenWrt SDK
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: sdk
          key: sdk-${{ matrix.name }}-${{ hashFiles('Makefile', 'files/**') }}

      - name: Download OpenWrt SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          echo "Downloading ${{ matrix.sdk }}"
          curl -fsSL "${{ matrix.sdk }}" -o sdk.tar.zst
          # 24.10 SDKs ship as .tar.zst — GNU tar 1.31+ supports `--zstd`.
          tar --zstd -xf sdk.tar.zst
          rm sdk.tar.zst
          if [ -d openwrt-sdk-* ]; then
            mv openwrt-sdk-* sdk
          fi

      - name: Stage package into SDK
        run: |
          set -euo pipefail
          rm -rf sdk/package/luci-app-limitpolice
          mkdir -p sdk/package/luci-app-limitpolice
          cp Makefile sdk/package/luci-app-limitpolice/Makefile
          cp LICENSE  sdk/package/luci-app-limitpolice/LICENSE
          cp -r files  sdk/package/luci-app-limitpolice/files

      - name: Build package
        working-directory: sdk
        run: |
          set -euo pipefail
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          echo "CONFIG_PACKAGE_luci-app-limitpolice=m" >> .config
          make defconfig
          make package/luci-app-limitpolice/compile V=s

          echo "==== built artifacts ===="
          find bin/packages -name 'luci-app-limitpolice*.ipk' -print -exec ls -lh {} +

      - name: Verify ipk was produced
        run: |
          set -euo pipefail
          shopt -s globstar nullglob
          ipks=( sdk/bin/packages/${{ matrix.packages_dir }}/**/luci-app-limitpolice*.ipk )
          if [ ${#ipks[@]} -eq 0 ]; then
            echo "::error::No ipk found under sdk/bin/packages/${{ matrix.packages_dir }}/"
            exit 1
          fi
          echo "Will upload: ${ipks[@]}"

      - name: Upload .ipk artifact
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-limitpolice-${{ matrix.name }}
          path: sdk/bin/packages/${{ matrix.packages_dir }}/**/luci-app-limitpolice*.ipk
          if-no-files-found: error