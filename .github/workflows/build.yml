name: Build IPK

# Triggers:
#   - manual run (workflow_dispatch)
#   - any tag matching v*
#   - pushes to main that touch the package itself
#
# Matrix is per-architecture ONLY. Each .ipk is built once per arch
# (PKGARCH=all → contents are arch-independent) and is installable on
# every supported OpenWrt release (18.06 → 24.10), as long as the host
# router matches the arch tag in the package name.
on:
  workflow_dispatch:
  push:
    tags: [ 'v*' ]
    paths:
      - 'Makefile'
      - 'files/**'
      - '.github/workflows/build.yml'

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        # One entry per target hardware family. The package contents are
        # text/shell only, so a single .ipk per arch covers every OpenWrt
        # release we support (18.06 → 24.10). Opkg resolves per-arch
        # kmod dependencies (kmod-sched-act-police etc.) at install time.
        #
        # SDK URL notes:
        # - OpenWrt 24.10 ships SDKs as .tar.zst (not .tar.xz). Need
        #   `tar --zstd` (GNU tar 1.31+, fine on ubuntu-22.04 runner).
        # - 24.10.7 is the latest 24.10 point release.
        include:
          - name: x86_64 (soft-router / generic)
            sdk: https://downloads.openwrt.org/releases/24.10.7/targets/x86/64/openwrt-sdk-24.10.7-x86-64_gcc-13.3.0_musl.Linux-x86_64.tar.zst
            packages_dir: x86_64

          # MediaTek MT7621, MT7628, RT305x etc. — the original "weak CPU"
          # target the README was written around.
          - name: mipsel_24kc (MT7621 / ramips)
            sdk: https://downloads.openwrt.org/releases/24.10.7/targets/ramips/mt7621/openwrt-sdk-24.10.7-ramips-mt7621_gcc-13.3.0_musl.Linux-x86_64.tar.zst
            packages_dir: mipsel_24kc

          # MediaTek Filogic 820/830/880 (MT7981/86/88), plus armvirt 64.
          # Modern 64-bit ARM home routers.
          - name: aarch64_cortex-a53 (Filogic / armvirt-64)
            sdk: https://downloads.openwrt.org/releases/24.10.7/targets/mediatek/filogic/openwrt-sdk-24.10.7-mediatek-filogic_gcc-13.3.0_musl.Linux-x86_64.tar.zst
            packages_dir: aarch64_cortex-a53

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache OpenWrt SDK
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: sdk
          key: sdk-${{ matrix.name }}-${{ hashFiles('Makefile', 'files/**') }}

      - name: Download OpenWrt SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          echo "Downloading ${{ matrix.sdk }}"
          curl -fsSL "${{ matrix.sdk }}" -o sdk.tar.zst
          # OpenWrt 24.10 SDKs ship as .tar.zst (zstd-compressed). tar
          # decompresses them via the `--zstd` flag (GNU tar >= 1.31).
          tar --zstd -xf sdk.tar.zst
          rm sdk.tar.zst
          if [ -d openwrt-sdk-* ]; then
            mv openwrt-sdk-* sdk
          fi

      - name: Stage package into SDK
        run: |
          set -euo pipefail
          rm -rf sdk/package/luci-app-limitpolice
          mkdir -p sdk/package/luci-app-limitpolice
          cp Makefile sdk/package/luci-app-limitpolice/Makefile
          cp LICENSE  sdk/package/luci-app-limitpolice/LICENSE
          cp -r files sdk/package/luci-app-limitpolice/files

      - name: Build package
        working-directory: sdk
        run: |
          set -euo pipefail
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          echo "CONFIG_PACKAGE_luci-app-limitpolice=m" >> .config
          make defconfig
          make package/luci-app-limitpolice/compile V=s

          echo "==== built artifacts ===="
          find bin/packages -name 'luci-app-limitpolice*.ipk' -print -exec ls -lh {} +

      - name: Upload .ipk artifact
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-limitpolice-${{ matrix.name }}
          path: sdk/bin/packages/${{ matrix.packages_dir }}/luci-app-limitpolice*.ipk
          if-no-files-found: error